### model
model_name_or_path: saves/qwen35-0_8b-vqa-med-cls/checkpoint-archive-1200
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

### multimodal
freeze_vision_tower: true
freeze_multi_modal_projector: false
freeze_language_model: false

### dataset
dataset_dir: datasets/vqa_med
dataset: vqa_train_cls
eval_dataset: vqa_val_cls
template: qwen3_5_nothink
cutoff_len: 1024
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### multimodal Vulcan collapse
use_collapse_loss: true
collapse_cluster_idx_path: saves/qwen35-0_8b-vqa-med-cls/vulcan/cluster_idx_multimodal_0_50_ckpt1200.json
collapse_lambda1: 0.0
collapse_lambda2: 0.0
collapse_learnable_lambda: true
collapse_lambda_lr: -0.1
collapse_use_weight_proxy: false
collapse_reduction: normalized
collapse_warmup_steps: 200
collapse_ramp_steps: 800
collapse_loss_scale: 1.0

### output
output_dir: saves/qwen35-0_8b-vqa-med-cls/full/multimodal-vulcan-from-ckpt1200-keep050
logging_steps: 10
save_steps: 100
save_total_limit: 8
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 3.0e-6
weight_decay: 0.05
max_steps: 1600
lr_scheduler_type: constant
warmup_steps: 0
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
gradient_checkpointing: true
seed: 42
data_seed: 42

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
