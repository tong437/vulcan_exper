### model
model_name_or_path: Qwen/Qwen3.5-0.8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z2_config.json

### multimodal: freeze vision tower to prevent catastrophic forgetting on small dataset
freeze_vision_tower: true
unfreeze_vision_tower_last_n: 8
freeze_multi_modal_projector: false
freeze_language_model: false

### per-component learning rates (when unfreeze_vision_tower_last_n > 0)
vision_tower_lr: 1.0e-7
projector_lr: 3.0e-7
language_model_lr: 5.0e-7

### dataset
dataset_dir: datasets/vqa_rad
dataset: vqa_rad_train_yesno
eval_dataset: vqa_rad_test_yesno
template: qwen3_5_nothink
cutoff_len: 2048
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### output
output_dir: saves/qwen35-0_8b-vqa-rad/full/sft-unfreeze-vl
logging_steps: 10
save_steps: 100
save_total_limit: 5
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 3.0e-7
num_train_epochs: 8.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 3600
resume_from_checkpoint: null

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
early_stopping_steps: 3
