### model
model_name_or_path: saves/qwen35-0_8b-vqa-med-cls/checkpoint-archive-1200
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
# Activation alignment retains per-layer MLP activations. Offload AdamW states
# to CPU so the first optimizer step fits on a 24 GB GPU.
deepspeed: examples/deepspeed/ds_z2_offload_config.json

### multimodal
freeze_vision_tower: true
freeze_multi_modal_projector: false
freeze_language_model: false

### dataset
dataset_dir: datasets/vqa_med
dataset: vqa_train_cls
eval_dataset: vqa_val_cls
template: qwen3_5_nothink
cutoff_len: 1024
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### vulcan activation alignment
# VQA-Med answers are short labels, so pool question and answer tokens together.
use_activation_align: true
align_lambda: 0.05
align_temperature: 0.05
align_quantile: 0.8
align_pool_type: mean
align_loss_type: soft_iou
align_text_mode: qa

### output
output_dir: saves/qwen35-0_8b-vqa-med-cls/full/align-only-from-ckpt1200-qa-lam005-lr3e6
logging_steps: 10
save_steps: 50
save_total_limit: 5
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 3.0e-6
max_steps: 200
lr_scheduler_type: constant
warmup_steps: 0
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
gradient_checkpointing: true

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50
