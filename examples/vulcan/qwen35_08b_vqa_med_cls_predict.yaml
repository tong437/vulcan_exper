### model
# Point this to the trained baseline, balanced, or Vulcan checkpoint.
model_name_or_path: saves/qwen35-0_8b-vqa-med-cls/checkpoint-archive-1800
trust_remote_code: true

### method
stage: sft
do_train: false
do_predict: true
finetuning_type: full

### dataset
dataset_dir: datasets/vqa_med
# Change this to vqa_val_modality, vqa_val_plane, or vqa_val_organ for per-category evaluation.
eval_dataset: vqa_val_cls
template: qwen3_5_nothink
cutoff_len: 1024
preprocessing_num_workers: 4
dataloader_num_workers: 2
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### output
output_dir: outputs/qwen35-0_8b-vqa-med-cls/checkpoint-archive-1800/val-cls
overwrite_output_dir: true
report_to: none

### generation
predict_with_generate: true
max_new_tokens: 24
do_sample: false
num_beams: 1
skip_special_tokens: true

### eval
per_device_eval_batch_size: 1
