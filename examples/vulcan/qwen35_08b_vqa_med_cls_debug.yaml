### model
# Replace with the server-local path, e.g. /root/autodl-pub/models/qwen3.5-0.8b
model_name_or_path: /path/to/qwen3.5-0.8b
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

### multimodal
freeze_vision_tower: true
freeze_multi_modal_projector: false
freeze_language_model: false

### dataset
# Expected entries in dataset_info.json:
#   vqa_med_train_cls, vqa_med_val_cls, vqa_med_val_modality, vqa_med_val_plane, vqa_med_val_organ
dataset_dir: /path/to/datasets/vqa_med_cls
dataset: vqa_med_train_cls
eval_dataset: vqa_med_val_cls
template: qwen3_5_nothink
cutoff_len: 1024
max_samples: 32
preprocessing_num_workers: 1
dataloader_num_workers: 0
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### output
output_dir: /path/to/saves/qwen35-0_8b-vqa-med-cls/full/debug
logging_steps: 1
save_steps: 20
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 3.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: false
fp16: false
ddp_timeout: 180000000
resume_from_checkpoint: null
gradient_checkpointing: true

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 20
