### model
# Override model_name_or_path from CLI with a strong full-SFT checkpoint.
model_name_or_path: saves/qwen35-0_8b-vqa-rad/full/sft-strong
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
dataset_dir: datasets/vqa_rad
dataset: vqa_rad_train_yesno
eval_dataset: vqa_rad_test_yesno
template: qwen3_5_nothink
cutoff_len: 2048
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 524288
image_min_pixels: 1024

### output
output_dir: saves/qwen35-0_8b-vqa-rad/full/sft-strong-yesno
logging_steps: 5
save_steps: 50
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-6
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
predict_with_generate: true
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
