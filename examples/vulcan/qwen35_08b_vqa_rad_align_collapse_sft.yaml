### model
model_name_or_path: saves/qwen35-0_8b-vqa-rad/full/baseline-full-vqa
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
dataset_dir: datasets/vqa_rad
dataset: vqa_rad_train
eval_dataset: vqa_rad_test
template: qwen3_5_nothink
cutoff_len: 2048
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### vulcan collapse loss
# Keep the collapse side aligned with the v3 recommendation.
# Activation alignment remains experimental.
use_collapse_loss: true
collapse_cluster_idx_path: saves/qwen35-0_8b-vqa-rad/vulcan/cluster_idx_greedy_match_0_50_baseline_full_vqa.json
collapse_lambda1: 0.0
collapse_lambda2: 0.0
collapse_learnable_lambda: true
collapse_lambda_lr: -0.1
collapse_use_weight_proxy: false

### vulcan activation alignment
use_activation_align: true
align_lambda: 10.0
align_temperature: 0.05
align_quantile: 0.8
align_pool_type: mean
align_loss_type: soft_iou
align_text_mode: answer

### output
output_dir: saves/qwen35-0_8b-vqa-rad/full/vulcan-align-collapse-from-baseline-full-vqa-lr1e5-lam01
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3.0
max_steps: 2188
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
