### model
# Start Vulcan from the VQA-Med classification baseline checkpoint, not from VQA-RAD.
model_name_or_path: /path/to/saves/qwen35-0_8b-vqa-med-cls/full/baseline
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

### multimodal
freeze_vision_tower: true
freeze_multi_modal_projector: false
freeze_language_model: false

### dataset
dataset_dir: /path/to/datasets/vqa_med_cls
dataset: vqa_med_train_cls
eval_dataset: vqa_med_val_cls
template: qwen3_5_nothink
cutoff_len: 1024
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### vulcan collapse loss
# Recompute this cluster file from the VQA-Med classification baseline checkpoint.
# Never reuse the VQA-RAD cluster_idx file.
use_collapse_loss: true
collapse_cluster_idx_path: /path/to/saves/qwen35-0_8b-vqa-med-cls/vulcan/cluster_idx_greedy_match_0_50_baseline.json
collapse_lambda1: 0.0
collapse_lambda2: 0.0
collapse_learnable_lambda: true
collapse_lambda_lr: -0.1
collapse_use_weight_proxy: false

### output
output_dir: /path/to/saves/qwen35-0_8b-vqa-med-cls/full/vulcan-from-baseline-lr1e5-lam01
logging_steps: 10
save_steps: 100
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
gradient_checkpointing: true

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
