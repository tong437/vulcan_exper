### model
# Replace with the local server path if the model has already been downloaded.
model_name_or_path: /root/autodl-pub-RTX4090-hdd-1/models/qwen3.5-0.8b
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

### dataset
dataset_dir: datasets/vqa_rad
dataset: vqa_rad_train_yesno
eval_dataset: vqa_rad_test_yesno
template: qwen3_5_nothink
cutoff_len: 2048
preprocessing_num_workers: 8
dataloader_num_workers: 4
enable_thinking: false

### processor
image_max_pixels: 262144
image_min_pixels: 1024

### vulcan collapse loss
# v3 recommended setting for VQA-RAD yes/no 0.50 pruning:
# raw learnable lambda + plain SGD gradient ascent, with direct MLP gradients.
use_collapse_loss: true
collapse_cluster_idx_path: saves/qwen35-0_8b-vqa-rad/vulcan/cluster_idx_greedy_match_0_50_yesno.json
collapse_lambda1: 0.0
collapse_lambda2: 0.0
collapse_learnable_lambda: true
collapse_lambda_lr: -1.0
collapse_use_weight_proxy: false

### output
output_dir: saves/qwen35-0_8b-vqa-rad/full/vulcan-sft-v3
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 6.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
resume_from_checkpoint: null

### eval
predict_with_generate: false
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
